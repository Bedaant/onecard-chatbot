<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneCard · Uno AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── App Shell ── */
    .app {
      width: 420px;
      height: 780px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: relative;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .header-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff;
    }
    .header-info { flex: 1; }
    .header-name { color: #fff; font-size: 15px; font-weight: 600; }
    .header-sub { color: #94a3b8; font-size: 11px; margin-top: 1px; display: flex; align-items: center; gap: 4px; }
    .ai-badge {
      background: rgba(233,69,96,0.2);
      color: #e94560;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }
    .header-card {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: right;
    }
    .header-card-num { color: #94a3b8; font-size: 10px; }
    .header-card-status { color: #10b981; font-size: 10px; font-weight: 600; }

    /* ── Quick Stats Bar ── */
    .stats-bar {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      padding: 10px 20px;
      gap: 0;
    }
    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-left: 1px solid #e2e8f0; }
    .stat-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 13px; font-weight: 700; color: #1e293b; margin-top: 2px; }
    .stat-value.warning { color: #f59e0b; }
    .stat-value.danger { color: #ef4444; }
    .stat-value.success { color: #10b981; }

    /* ── Messages Area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    /* ── Message Bubbles ── */
    .msg { display: flex; gap: 8px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, #e94560, #c0392b); color: #fff; }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }

    .msg-content { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user .msg-content { align-items: flex-end; }

    .msg-bubble {
      padding: 10px 13px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.5;
      position: relative;
    }
    .msg.bot .msg-bubble {
      background: #f1f5f9;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Markdown in bubbles */
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code {
      background: rgba(0,0,0,0.07);
      padding: 1px 4px; border-radius: 3px; font-size: 12px;
    }

    /* ── Route Badge ── */
    .route-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 6px; border-radius: 3px;
      align-self: flex-start;
    }
    .route-A { background: #d1fae5; color: #065f46; }
    .route-B { background: #fef3c7; color: #92400e; }
    .route-C { background: #dbeafe; color: #1e40af; }
    .route-D { background: #fee2e2; color: #991b1b; }
    .route-E { background: #f3f4f6; color: #374151; }
    .route-T1 { background: #ede9fe; color: #5b21b6; }
    .route-SECURITY { background: #fee2e2; color: #991b1b; }
    .route-FRUSTRATION { background: #fef3c7; color: #92400e; }

    .tier-info {
      font-size: 9px; color: #94a3b8;
      margin-top: 1px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ── Clarify Options ── */
    .clarify-options {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
    }
    .clarify-btn {
      background: #fff;
      border: 1.5px solid #e94560;
      color: #e94560;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .clarify-btn:hover { background: #e94560; color: #fff; }

    /* ── Slot Options ── */
    .slot-options {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
    }
    .slot-btn {
      background: #f1f5f9;
      border: 1.5px solid #cbd5e1;
      color: #334155;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .slot-btn:hover { background: #1e293b; color: #fff; border-color: #1e293b; }

    /* ── Deep Link Button ── */
    .deep-link-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .deep-link-btn:hover { opacity: 0.9; }
    .deep-link-btn svg { width: 13px; height: 13px; }

    /* ── OTP Card ── */
    .otp-card {
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 6px;
    }
    .otp-label { font-size: 11px; color: #9a3412; font-weight: 700; margin-bottom: 8px; }
    .otp-inputs { display: flex; gap: 8px; margin-bottom: 10px; }
    .otp-input {
      width: 36px; height: 40px;
      border: 2px solid #fed7aa;
      border-radius: 8px;
      text-align: center;
      font-size: 18px; font-weight: 700;
      color: #1e293b;
      outline: none;
    }
    .otp-input:focus { border-color: #e94560; }
    .otp-submit {
      background: #e94560; color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .otp-submit:hover { opacity: 0.9; }
    .otp-hint { font-size: 10px; color: #9a3412; margin-top: 6px; }

    /* ── OTP Auto Note (prototype) ── */
    .otp-auto-note {
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
      padding: 2px 0 4px;
      animation: fadeIn 0.2s ease;
    }
    .otp-auto-icon { margin-right: 4px; }

    /* ── Bullet list in bubbles ── */
    .msg-bubble ul {
      margin: 4px 0 2px 14px;
      padding: 0;
    }
    .msg-bubble li {
      margin-bottom: 2px;
      line-height: 1.5;
    }

    /* ── Typing Indicator ── */
    .typing {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px;
      background: #f1f5f9;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* ── Input Area ── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #f1f5f9;
      background: #fff;
    }

    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px 14px;
      display: flex; align-items: center;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: #e94560; }
    .msg-input {
      flex: 1; border: none; background: transparent;
      font-size: 13.5px; color: #1e293b; resize: none;
      outline: none; font-family: inherit; max-height: 80px; min-height: 20px;
    }
    .msg-input::placeholder { color: #94a3b8; }
    .send-btn {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Routing Inspector ── */
    .inspector {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 200px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 10px;
      padding: 12px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      font-family: 'Courier New', monospace;
      z-index: 10;
    }
    .inspector.open { transform: translateX(0); }
    .inspector-title { font-weight: 700; color: #e94560; margin-bottom: 8px; font-size: 11px; }
    .inspector-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #1e293b; }
    .inspector-turn { color: #64748b; font-size: 9px; margin-bottom: 3px; }
    .inspector-key { color: #94a3b8; }
    .inspector-val { color: #e2e8f0; word-break: break-all; }
    .inspector-val.highlight { color: #e94560; font-weight: 700; }

    .inspector-toggle {
      position: absolute; right: 12px; top: 18px;
      background: rgba(255,255,255,0.1);
      border: none; color: #94a3b8;
      padding: 4px 8px; border-radius: 6px;
      font-size: 10px; cursor: pointer;
      font-family: inherit;
    }
    .inspector-toggle:hover { color: #fff; background: rgba(255,255,255,0.2); }

    /* ── Frustration bar ── */
    .frustration-bar-wrap {
      display: flex; align-items: center; gap: 6px; margin-top: 6px;
    }
    .frustration-label { font-size: 9px; color: #94a3b8; }
    .frustration-bar {
      flex: 1; height: 3px; background: #e2e8f0; border-radius: 2px; overflow: hidden;
    }
    .frustration-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444);
      transition: width 0.4s ease;
    }

    /* ── Agent handoff card ── */
    .agent-card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 12px;
      padding: 14px;
      margin-top: 6px;
      color: #fff;
    }
    .agent-card-title { font-size: 12px; font-weight: 700; color: #e94560; margin-bottom: 6px; }
    .agent-card-body { font-size: 11px; color: #94a3b8; line-height: 1.5; }
    .agent-card-action {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .agent-btn {
      flex: 1; padding: 8px; border-radius: 8px;
      font-size: 11px; font-weight: 700; cursor: pointer; border: none;
      transition: opacity 0.15s;
    }
    .agent-btn.primary { background: #e94560; color: #fff; }
    .agent-btn.secondary { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .agent-btn:hover { opacity: 0.85; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { background: #fff; align-items: flex-start; }
      .app { width: 100vw; height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <div class="header-avatar">U</div>
      <div class="header-info">
        <div class="header-name">Uno</div>
        <div class="header-sub">
          <span class="ai-badge">AI</span>
          OneCard Assistant · Online
        </div>
      </div>
      <div class="header-card" id="headerCard">
        <div class="header-card-num">VISA ····4892</div>
        <div class="header-card-status">ACTIVE</div>
      </div>
      <button class="inspector-toggle" onclick="toggleInspector()">⚙ Inspector</button>
    </div>

    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <div class="stat-label">Outstanding</div>
        <div class="stat-value warning" id="statOutstanding">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Due Date</div>
        <div class="stat-value" id="statDue">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Reward Pts</div>
        <div class="stat-value success" id="statPoints">—</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="frustration-bar-wrap">
        <span class="frustration-label">Frustration</span>
        <div class="frustration-bar">
          <div class="frustration-fill" id="frustrationFill" style="width:0%"></div>
        </div>
        <span class="frustration-label" id="frustrationPct">0%</span>
      </div>
      <div class="input-row" style="margin-top:8px">
        <div class="input-wrap">
          <textarea
            class="msg-input"
            id="msgInput"
            rows="1"
            placeholder="Type in English, Hindi, or Hinglish..."
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Routing Inspector Panel -->
    <div class="inspector" id="inspector">
      <div class="inspector-title">⚙ Routing Inspector</div>
      <div id="inspectorEntries"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
